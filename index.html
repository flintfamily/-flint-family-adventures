<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flint Family Adventures</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section id="loginScreen" class="screen login-screen">
      <div class="glass-card login-card">
        <div class="logo">🏔️</div>
        <h1>Flint Family Adventures</h1>
        <p>Private family adventure hub</p>
        <input id="passwordInput" type="password" placeholder="Enter password" autocomplete="current-password" />
        <button id="loginButton">Enter Family Hub</button>
        <p id="loginError" class="error"></p>
        <small>Temporary password: <strong>flint2026</strong></small>
      </div>
    </section>

    <section id="dashboardScreen" class="screen dashboard-screen hidden">
      <header class="hero">
        <p class="eyebrow">Welcome back</p>
        <h1>Flint Family Adventures</h1>
        <p>Every adventure. Every memory. One place.</p>
      </header>

      <section class="next-trip card">
        <div>
          <p class="eyebrow">Next Adventure</p>
          <h2>Coming soon</h2>
          <p>Add your next trip here.</p>
        </div>
        <div class="countdown">✈️</div>
      </section>

      <section class="grid">
        <button class="tile"><span>✈️</span><strong>Trips</strong><small>Upcoming, past and dream trips</small></button>
        <button class="tile"><span>📸</span><strong>Memories</strong><small>Photos and favourite moments</small></button>
        <button class="tile"><span>🗺️</span><strong>Map</strong><small>Places you have been</small></button>
        <button class="tile"><span>📅</span><strong>Calendar</strong><small>Family dates and plans</small></button>
        <button class="tile"><span>🎄</span><strong>Christmas</strong><small>Ideas, lists and plans</small></button>
        <button class="tile"><span>⚙️</span><strong>Settings</strong><small>Website options</small></button>
      </section>

      <button id="logoutButton" class="logout">Log out</button>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
